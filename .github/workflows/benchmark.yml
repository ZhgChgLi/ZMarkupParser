name: Benchmark

# workflow_dispatch can only be triggered after the workflow file
# lands on the default branch. To run this against the current PR
# without merging first, use the labeled trigger: add a label named
# `benchmark` to the PR and this fires once.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post results to"
        required: true
        type: number
      base_ref:
        description: "Baseline ref (defaults to main)"
        required: false
        default: "main"
        type: string
  pull_request:
    types: [labeled]

jobs:
  benchmark:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'benchmark'
    runs-on: macos-14
    permissions:
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
      BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || inputs.base_ref }}
      HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.2"

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_REF }}
          path: baseline

      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_REF }}
          path: pr

      - name: Bench baseline
        run: |
          set -o pipefail
          cd baseline
          # Fix a pre-existing compile error in the perf test on main
          # (HTMLTag(tagName: $0) over a [(HTMLTagName, MarkupStyle?)]
          # tuple — needs $0.0). The PR HEAD already has this fix.
          sed -i '' 's/HTMLTag(tagName: $0)/HTMLTag(tagName: $0.0)/' \
            Tests/ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests.swift
          xcodebuild test \
            -workspace ZMarkupParser.xcworkspace \
            -testPlan Performance \
            -scheme ZMarkupParser \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testZHTMLMarkupParserMeasure \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testDocumentTypeHTMLMeasure \
            -destination 'platform=macOS' \
            build test | xcpretty

      - name: Bench PR HEAD
        run: |
          set -o pipefail
          cd pr
          xcodebuild test \
            -workspace ZMarkupParser.xcworkspace \
            -testPlan Performance \
            -scheme ZMarkupParser \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testZHTMLMarkupParserMeasure \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testDocumentTypeHTMLMeasure \
            -destination 'platform=macOS' \
            build test | xcpretty

      - name: Post comparison comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          BASE_ZMP=$(jq -r '.avgTime' baseline/Tests/ZMarkupParserPerformanceTests/Report/testZHTMLMarkupParserMeasure.json)
          BASE_DT=$(jq -r '.avgTime' baseline/Tests/ZMarkupParserPerformanceTests/Report/testDocumentTypeHTMLMeasure.json)
          HEAD_ZMP=$(jq -r '.avgTime' pr/Tests/ZMarkupParserPerformanceTests/Report/testZHTMLMarkupParserMeasure.json)
          HEAD_DT=$(jq -r '.avgTime' pr/Tests/ZMarkupParserPerformanceTests/Report/testDocumentTypeHTMLMeasure.json)

          ZMP_SPEEDUP=$(awk "BEGIN { printf \"%.2f\", $BASE_ZMP / $HEAD_ZMP }")
          DT_SPEEDUP=$(awk "BEGIN { printf \"%.2f\", $HEAD_DT / $HEAD_ZMP }")

          BODY=$(cat <<EOF
          ## Benchmark: PR vs \`$BASE_REF\` vs \`NSAttributedString.DocumentType.html\`

          Workload: \`String(repeating: htmlString, count: 300)\`, average of 10 runs (\`testZHTMLMarkupParserMeasure\` / \`testDocumentTypeHTMLMeasure\`).
          Runner: macos-14, Xcode 15.2, \`platform=macOS\`.

          | Renderer | avg time (s) |
          | --- | --- |
          | \`NSAttributedString.DocumentType.html\` (PR run) | $HEAD_DT |
          | ZMarkupParser \`$BASE_REF\` (baseline) | $BASE_ZMP |
          | ZMarkupParser PR HEAD | $HEAD_ZMP |

          - PR vs \`$BASE_REF\` ZMarkupParser: **${ZMP_SPEEDUP}×** speedup.
          - PR vs \`NSAttributedString.DocumentType.html\`: **${DT_SPEEDUP}×** speedup.

          [Run details](https://github.com/$REPO/actions/runs/${{ github.run_id }})
          EOF
          )

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
