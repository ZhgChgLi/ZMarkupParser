name: Benchmark

# workflow_dispatch can only be triggered after the workflow file
# lands on the default branch. To run this against the current PR
# without merging first, use the labeled trigger: add a label named
# `benchmark` to the PR and this fires once.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post results to"
        required: true
        type: number
      base_ref:
        description: "Baseline ref (defaults to main)"
        required: false
        default: "main"
        type: string
  pull_request:
    types: [labeled]

jobs:
  benchmark:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'benchmark'
    runs-on: macos-14
    permissions:
      pull-requests: write
    timeout-minutes: 240
    env:
      PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
      BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || inputs.base_ref }}
      HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.2"

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_REF }}
          path: baseline

      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_REF }}
          path: pr

      - name: Port sweep tests onto baseline
        run: |
          cp pr/Tests/ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests.swift \
             baseline/Tests/ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests.swift

      # Baseline only runs the small sizes. Anything larger would take
      # 30+ min per render under the pre-fix O(N²) lookup.
      - name: Bench baseline (small sizes)
        env:
          SWEEP_SIZES: "300,1000"
          SWEEP_RUNS: "3"
        run: |
          set -o pipefail
          cd baseline
          xcodebuild test \
            -workspace ZMarkupParser.xcworkspace \
            -testPlan Performance \
            -scheme ZMarkupParser \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testZHTMLMarkupParserSweep \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testDocumentTypeHTMLSweep \
            -destination 'platform=macOS' \
            build test | xcpretty

      # PR HEAD runs the full sweep including very large inputs.
      # `runs=1` for the large sweep to keep total runtime sane —
      # we just want a scaling-curve data point, not an average.
      - name: Bench PR HEAD (small sizes)
        env:
          SWEEP_SIZES: "300,1000"
          SWEEP_RUNS: "3"
        run: |
          set -o pipefail
          cd pr
          xcodebuild test \
            -workspace ZMarkupParser.xcworkspace \
            -testPlan Performance \
            -scheme ZMarkupParser \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testZHTMLMarkupParserSweep \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testDocumentTypeHTMLSweep \
            -destination 'platform=macOS' \
            build test | xcpretty
          # Save the small-size results before they get overwritten by the next sweep.
          mv Tests/ZMarkupParserPerformanceTests/Report/testZHTMLMarkupParserSweep.json \
             Tests/ZMarkupParserPerformanceTests/Report/testZHTMLMarkupParserSweep.small.json

      - name: Bench PR HEAD (large sizes)
        env:
          SWEEP_SIZES: "3000,10000,30000"
          SWEEP_RUNS: "1"
        run: |
          set -o pipefail
          cd pr
          xcodebuild test \
            -workspace ZMarkupParser.xcworkspace \
            -testPlan Performance \
            -scheme ZMarkupParser \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testZHTMLMarkupParserSweep \
            -destination 'platform=macOS' \
            build test | xcpretty
          mv Tests/ZMarkupParserPerformanceTests/Report/testZHTMLMarkupParserSweep.json \
             Tests/ZMarkupParserPerformanceTests/Report/testZHTMLMarkupParserSweep.large.json

      # Find DocType.html's actual crash threshold by running each size
      # in a subprocess. If a child process crashes (SIGABRT/SIGSEGV)
      # the parent records that and continues — without this, a
      # CoreFoundation crash would take the whole xctest process down.
      - name: DocType.html crash sweep (subprocess)
        run: |
          # Disable errexit explicitly: GitHub Actions' default shell is
          # `bash -eo pipefail`, and a non-success subprocess exit
          # (e.g. CoreFoundation crash) is exactly what we want to
          # observe and continue past.
          set +e
          set -uo pipefail
          mkdir -p doctype_results
          cat > /tmp/doctype_bench.swift <<'SWIFT_EOF'
          import Foundation

          let html = """
              🎄🎄🎄 <Hottest> <b>Christmas gi<u>fts</b> are here</u>! Give you more gift-giving inspiration~<br />
              The <u>final <del>countdown</del></u> on 12/9, NT$100 discount for all purchases over NT$1,000, plus a 12/12 one-day limited free shipping coupon<br>
              Top 10 Popular <b><span style="color:green">Christmas</span> Gift</b> Recommendations
              """

          // Read size from env to avoid swift CLI's argv-vs-flag ambiguity.
          guard let raw = ProcessInfo.processInfo.environment["BENCH_COUNT"],
                let count = Int(raw) else {
              FileHandle.standardError.write("BENCH_COUNT env var not set\n".data(using: .utf8)!)
              exit(2)
          }

          let input = String(repeating: html, count: count)
          let length = input.utf8.count
          let data = input.data(using: .utf8)!
          let opts: [NSAttributedString.DocumentReadingOptionKey: Any] = [
              .documentType: NSAttributedString.DocumentType.html,
              .characterEncoding: String.Encoding.utf8.rawValue
          ]

          let start = CFAbsoluteTimeGetCurrent()
          do {
              _ = try NSAttributedString(data: data, options: opts, documentAttributes: nil)
          } catch {
              print("THROW length=\(length) error=\(error.localizedDescription)")
              exit(3)
          }
          let elapsed = CFAbsoluteTimeGetCurrent() - start
          print("OK length=\(length) elapsed=\(elapsed)")
          SWIFT_EOF

          # Probe progressively larger sizes; first failure marks the
          # crash threshold. Sizes in count units (htmlString ~340 bytes).
          # No timeout wrapper — macOS doesn't ship `timeout`, and each
          # subprocess either completes or crashes quickly. The job-level
          # timeout is the safety net.
          RESULTS_JSON='['
          FIRST=true
          for SIZE in 300 1000 3000 10000 30000 100000; do
              echo "::group::DocType count=$SIZE"
              OUTPUT=$(BENCH_COUNT="$SIZE" swift /tmp/doctype_bench.swift 2>&1)
              EXIT=$?
              echo "exit=$EXIT"
              echo "$OUTPUT"
              echo "::endgroup::"

              if [ "$EXIT" = "0" ]; then
                  LENGTH=$(echo "$OUTPUT" | grep "^OK " | sed -E 's/.*length=([0-9]+).*/\1/')
                  ELAPSED=$(echo "$OUTPUT" | grep "^OK " | sed -E 's/.*elapsed=([0-9.]+).*/\1/')
                  STATUS="ok"
              else
                  LENGTH=$(awk -v c="$SIZE" 'BEGIN { printf "%d", c * 340 }')
                  ELAPSED="-1"
                  STATUS="crash"
              fi
              if [ "$FIRST" = "true" ]; then FIRST=false; else RESULTS_JSON+=','; fi
              RESULTS_JSON+="{\"count\":$SIZE,\"length\":$LENGTH,\"elapsed\":$ELAPSED,\"status\":\"$STATUS\",\"exit\":$EXIT}"
              if [ "$STATUS" != "ok" ]; then
                  echo "Stopping sweep at size=$SIZE (status=$STATUS)"
                  break
              fi
          done
          RESULTS_JSON+=']'
          echo "$RESULTS_JSON" > doctype_results/results.json
          cat doctype_results/results.json

      - name: Post comparison comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          python3 <<'PY'
          import json, os, subprocess, sys
          from pathlib import Path

          REPORT = Path("Tests/ZMarkupParserPerformanceTests/Report")
          BASE = Path("baseline")
          PR = Path("pr")

          INPUTS = {
              "base_zmp_small": BASE / REPORT / "testZHTMLMarkupParserSweep.json",
              "base_dt_small":  BASE / REPORT / "testDocumentTypeHTMLSweep.json",
              "head_zmp_small": PR   / REPORT / "testZHTMLMarkupParserSweep.small.json",
              "head_dt_small":  PR   / REPORT / "testDocumentTypeHTMLSweep.json",
              "head_zmp_large": PR   / REPORT / "testZHTMLMarkupParserSweep.large.json",
              "dt_crash":       Path("doctype_results/results.json"),
          }

          # Load every input but tolerate misses — we'd rather post a
          # partial table that says "missing" than fail the whole job
          # and leave no record.
          loaded = {}
          for k, p in INPUTS.items():
              if not p.is_file():
                  print(f"::warning::missing {p}")
                  loaded[k] = None
                  continue
              try:
                  loaded[k] = json.loads(p.read_text())
                  print(f"loaded {p} ({p.stat().st_size} bytes)")
              except json.JSONDecodeError as e:
                  print(f"::warning::invalid JSON in {p}: {e}")
                  loaded[k] = None

          def fmt_time(t):
              if t is None: return "missing"
              if t < 0:     return "n/a"
              return f"{t:.3f}"

          def fmt_kb(length):
              return f"{round(length / 1024)}"

          def ratio(a, b):
              if a is None or b is None: return "n/a"
              if a < 0 or b <= 0:        return "n/a"
              return f"{a / b:.2f}×"

          # ----- Small-size comparison -----
          base_ref = os.environ.get("BASE_REF", "main")
          rows_small = []
          base_zmp = loaded["base_zmp_small"] or []
          head_zmp = loaded["head_zmp_small"] or []
          head_dt  = loaded["head_dt_small"]  or []
          for i in range(max(len(base_zmp), len(head_zmp), len(head_dt))):
              get = lambda lst, idx, key: (lst[idx].get(key) if idx < len(lst) else None)
              count = get(head_zmp, i, "count") or get(base_zmp, i, "count") or get(head_dt, i, "count")
              length = get(head_zmp, i, "length") or get(base_zmp, i, "length") or get(head_dt, i, "length") or 0
              bz = get(base_zmp, i, "avgTime")
              hz = get(head_zmp, i, "avgTime")
              hd = get(head_dt,  i, "avgTime")
              rows_small.append((count, length, bz, hz, hd))

          table_small = ""
          for count, length, bz, hz, hd in rows_small:
              table_small += (
                  f"| {count} (~{fmt_kb(length)} KB) "
                  f"| {fmt_time(bz)} "
                  f"| {fmt_time(hz)} "
                  f"| {ratio(bz, hz)} "
                  f"| {fmt_time(hd)} "
                  f"| {ratio(hd, hz)} |\n"
              )

          # ----- Large-size scaling (PR only) -----
          table_large = ""
          for entry in (loaded["head_zmp_large"] or []):
              table_large += (
                  f"| {entry['count']} (~{fmt_kb(entry['length'])} KB) "
                  f"| {fmt_time(entry['avgTime'])} |\n"
              )
          if not table_large:
              table_large = "| _missing_ | _missing_ |\n"

          # ----- DocType crash sweep -----
          table_dt = ""
          for entry in (loaded["dt_crash"] or []):
              status = entry.get("status")
              exit_code = entry.get("exit")
              if status == "ok":
                  cell = f"✅ {fmt_time(entry['elapsed'])} s"
              elif status == "timeout":
                  cell = "⏱ timed out"
              else:
                  cell = f"💥 crash (exit {exit_code})"
              table_dt += (
                  f"| {entry['count']} (~{fmt_kb(entry['length'])} KB) | {cell} |\n"
              )
          if not table_dt:
              table_dt = "| _missing_ | _missing_ |\n"

          run_id = os.environ["RUN_ID"]
          repo   = os.environ["REPO"]
          pr_num = os.environ["PR_NUMBER"]

          body = f"""## Benchmark sweep — small sizes (PR vs `{base_ref}` vs DocumentType.html)

          Average of 3 runs. Runner: macos-14, Xcode 15.2, `platform=macOS`.

          | size (count, bytes) | ZMP `{base_ref}` (s) | ZMP PR (s) | PR vs `{base_ref}` | DocType.html PR (s) | PR vs DocType.html |
          | --- | --- | --- | --- | --- | --- |
          {table_small}
          ## ZMarkupParser PR — large-size scaling (single run per size)

          Probes whether the post-refactor renderer keeps a linear curve at sizes well past where DocumentType.html breaks.

          | size (count, bytes) | ZMP PR (s) |
          | --- | --- |
          {table_large}
          ## NSAttributedString.DocumentType.html — crash sweep (subprocess per size)

          Each size runs in its own subprocess so a CoreFoundation crash doesn't kill the workflow. The sweep stops at the first non-success size.

          | size (count, bytes) | result |
          | --- | --- |
          {table_dt}
          [Run details](https://github.com/{repo}/actions/runs/{run_id})
          """
          # Strip the YAML/run-block leading indentation that Python's
          # multi-line string preserves.
          body = "\n".join(line[10:] if line.startswith(" " * 10) else line
                            for line in body.splitlines())

          print("::group::Comment body")
          print(body)
          print("::endgroup::")

          subprocess.run(
              ["gh", "pr", "comment", pr_num, "--repo", repo, "--body", body],
              check=True,
          )
          PY
