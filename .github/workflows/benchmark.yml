name: Benchmark

# workflow_dispatch can only be triggered after the workflow file
# lands on the default branch. To run this against the current PR
# without merging first, use the labeled trigger: add a label named
# `benchmark` to the PR and this fires once.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to post results to"
        required: true
        type: number
      base_ref:
        description: "Baseline ref (defaults to main)"
        required: false
        default: "main"
        type: string
  pull_request:
    types: [labeled]

jobs:
  benchmark:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'benchmark'
    runs-on: macos-14
    permissions:
      pull-requests: write
    timeout-minutes: 180
    env:
      PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
      BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || inputs.base_ref }}
      HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.2"

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_REF }}
          path: baseline

      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_REF }}
          path: pr

      - name: Port sweep tests onto baseline
        run: |
          # Two patches for the baseline checkout:
          # 1. Fix a pre-existing compile error in the perf test on main
          #    (HTMLTag(tagName: $0) over a [(HTMLTagName, MarkupStyle?)]
          #    tuple — needs $0.0).
          # 2. Replace the perf test file entirely with the PR HEAD
          #    version, which also adds the sweep test methods. We need
          #    the same sweep method names to exist on both refs so the
          #    `-only-testing:` flag finds them.
          cp pr/Tests/ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests.swift \
             baseline/Tests/ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests.swift

      - name: Bench baseline
        run: |
          set -o pipefail
          cd baseline
          xcodebuild test \
            -workspace ZMarkupParser.xcworkspace \
            -testPlan Performance \
            -scheme ZMarkupParser \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testZHTMLMarkupParserSweep \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testDocumentTypeHTMLSweep \
            -destination 'platform=macOS' \
            build test | xcpretty

      - name: Bench PR HEAD
        run: |
          set -o pipefail
          cd pr
          xcodebuild test \
            -workspace ZMarkupParser.xcworkspace \
            -testPlan Performance \
            -scheme ZMarkupParser \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testZHTMLMarkupParserSweep \
            -only-testing:ZMarkupParserPerformanceTests/ZMarkupParserPerformanceTests/testDocumentTypeHTMLSweep \
            -destination 'platform=macOS' \
            build test | xcpretty

      - name: Post comparison comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          REPORT_DIR="Tests/ZMarkupParserPerformanceTests/Report"
          BASE_ZMP="baseline/$REPORT_DIR/testZHTMLMarkupParserSweep.json"
          BASE_DT="baseline/$REPORT_DIR/testDocumentTypeHTMLSweep.json"
          HEAD_ZMP="pr/$REPORT_DIR/testZHTMLMarkupParserSweep.json"
          HEAD_DT="pr/$REPORT_DIR/testDocumentTypeHTMLSweep.json"

          # Merge four JSON arrays into one row-per-size table via jq.
          # Each input is [{ count, length, avgTime }, ...].
          ROWS=$(jq -n --slurpfile a "$BASE_ZMP" \
                       --slurpfile b "$HEAD_ZMP" \
                       --slurpfile c "$BASE_DT" \
                       --slurpfile d "$HEAD_DT" '
            $a[0] as $az | $b[0] as $bz | $c[0] as $ad | $d[0] as $bd
            | [range(0; $az | length)] | map(. as $i |
                {
                  count: ($az[$i].count),
                  length: ($az[$i].length),
                  base_zmp: ($az[$i].avgTime),
                  head_zmp: ($bz[$i].avgTime),
                  base_dt:  ($ad[$i].avgTime),
                  head_dt:  ($bd[$i].avgTime)
                }
              )')

          fmt() {
            # -1 → "n/a", else format with 3 decimals
            awk -v v="$1" 'BEGIN { if (v < 0) print "n/a"; else printf "%.3f", v }'
          }

          ratio() {
            # speedup of $2 over $1 (higher is better for $2)
            awk -v a="$1" -v b="$2" 'BEGIN {
              if (a < 0 || b < 0 || b == 0) print "n/a";
              else printf "%.2f×", a / b
            }'
          }

          TABLE=""
          while IFS=$'\t' read -r COUNT LENGTH BASE_ZMP_VAL HEAD_ZMP_VAL BASE_DT_VAL HEAD_DT_VAL; do
            BASE_ZMP_F=$(fmt "$BASE_ZMP_VAL")
            HEAD_ZMP_F=$(fmt "$HEAD_ZMP_VAL")
            BASE_DT_F=$(fmt "$BASE_DT_VAL")
            HEAD_DT_F=$(fmt "$HEAD_DT_VAL")
            ZMP_SPEEDUP=$(ratio "$BASE_ZMP_VAL" "$HEAD_ZMP_VAL")
            DT_SPEEDUP=$(ratio "$HEAD_DT_VAL" "$HEAD_ZMP_VAL")
            LENGTH_KB=$(awk -v l="$LENGTH" 'BEGIN { printf "%.0f", l / 1024 }')
            TABLE+="| ${COUNT} (~${LENGTH_KB} KB) | ${BASE_ZMP_F} | ${HEAD_ZMP_F} | ${ZMP_SPEEDUP} | ${HEAD_DT_F} | ${DT_SPEEDUP} |"$'\n'
          done < <(echo "$ROWS" | jq -r '.[] | [.count, .length, .base_zmp, .head_zmp, .base_dt, .head_dt] | @tsv')

          BODY=$(cat <<EOF
          ## Benchmark sweep: PR vs \`$BASE_REF\` vs \`NSAttributedString.DocumentType.html\`

          Workload: \`String(repeating: htmlString, count: N)\`, average of 3 runs per size (\`testZHTMLMarkupParserSweep\` / \`testDocumentTypeHTMLSweep\`).
          Runner: macos-14, Xcode 15.2, \`platform=macOS\`.

          | size (count, bytes) | ZMP \`$BASE_REF\` (s) | ZMP PR (s) | PR vs \`$BASE_REF\` | DocType.html PR (s) | PR vs DocType.html |
          | --- | --- | --- | --- | --- | --- |
          $TABLE

          \`n/a\` = skipped (DocumentType.html is skipped above ~500 KB to avoid the documented CoreFoundation crash on very large inputs).

          [Run details](https://github.com/$REPO/actions/runs/${{ github.run_id }})
          EOF
          )

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
